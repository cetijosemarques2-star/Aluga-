<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aluga+ Premium</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0}
header{background:#2563eb;color:#fff;padding:15px;text-align:center}
section{padding:20px}
.card{background:#fff;padding:25px;border-radius:10px;margin:15px 0;box-shadow:0 2px 8px rgba(0,0,0,.1);box-sizing:border-box}
input,select,textarea,button{width:100%;padding:12px;margin-top:8px;box-sizing:border-box;border-radius:6px}
input,select,textarea{border:1px solid #cbd5e1;background:#fff;color:#000}
button{background:#2563eb;color:white;border:none;cursor:pointer;font-weight:bold;transition:background 0.2s}
button:hover{background:#1d4ed8}

/* Modo Escuro */
.dark{background:#111;color:#eee}
.dark .card{background:#1e1e1e;color:#eee}
.dark input, .dark select, .dark textarea{background:#2d2d2d;color:#fff;border-color:#444}
.dark button{background:#3b82f6}
.dark button:hover{background:#2563eb}

/* Barra de Pesquisa */
.search-container {padding: 15px 20px; background: #e0e7ff; text-align: center;}
.search-container input {max-width: 600px; border: 1px solid #bej8fb; margin-top:0}
.dark .search-container {background: #1e293b;}

/* Destaque da Avaliação Visual */
.rating-badge {
    background: #fef08a; 
    color: #854d0e; 
    padding: 8px 12px; 
    border-radius: 6px; 
    display: inline-block; 
    font-weight: bold; 
    margin: 10px 0;
    font-size: 1.05em;
    border: 1px solid #fef08a;
}
.dark .rating-badge {background: #713f12; color: #fef08a; border-color: #a16207;}

/* Seção de Comentários Integrada */
.comment-section {margin-top: 20px; padding-top: 15px; border-top: 2px dashed #e2e8f0;}
.dark .comment-section {border-top-color: #334155;}
.comment-section h4 {margin: 0 0 10px 0; color: #1e293b;}
.dark .comment-section h4 {color: #f1f5f9;}

.comment-form {display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 15px;}
.star-select {width: auto; min-width: 150px; margin-top: 0;}
.comment-input {flex: 1; min-width: 200px; margin-top: 0;}
.comment-btn {width: auto; min-width: 100px; margin-top: 0; padding: 12px 20px;}

/* Lista de Comentários Abaixo */
.comment-list {background: #f8fafc; padding: 12px; border-radius: 8px; max-height: 200px; overflow-y: auto;}
.dark .comment-list {background: #2d2d2d;}
.comment-item {padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.95em; line-height: 1.4;}
.comment-item:last-child {border-bottom: none;}
.dark .comment-item {border-bottom-color: #444;}
.comment-stars {color: #eab308; font-weight: bold; margin-right: 5px;}

/* Botões de Ações Laterais */
.actions-container {display: flex; gap: 10px; margin-top: 15px;}
.actions-btn {flex: 1; margin-top: 0;}
</style>
</head>
<body>

<header>
<h1>Aluga+ Premium</h1>
<button onclick="toggleDark()" style="width:auto; padding: 6px 12px; margin-top:0;">🌙 Modo Escuro</button>
</header>

<div class="search-container">
 <input id="busca" type="text" placeholder="🔍 Buscar por título ou localização..." oninput="filtrarAnuncios()">
</div>

<section>
<h2>➕ Criar Anúncio</h2>
<div class="card">
<input id="titulo" placeholder="Título do Objeto ou Serviço">
<select id="tipo">
<option value="Objeto">Objeto</option>
<option value="Habilidade">Habilidade</option>
</select>
<input id="localizacao" placeholder="Cidade/Bairro">
<input type="file" id="foto">
<button onclick="criar()">Publicar Anúncio</button>
</div>
</section>

<section>
<h2>🆘 Preciso de Ajuda</h2>
<div class="card">
<textarea id="pedido" placeholder="Descreva sua necessidade..."></textarea>
<button onclick="publicarPedido()">Publicar Pedido</button>
</div>
<div id="pedidos"></div>
</section>

<section>
<h2>📦 Anúncios Disponíveis</h2>
<div id="lista"></div>
</section>

<script>
// Banco de dados em memória para consistência total da aplicação
let listaAnuncios = [];

function toggleDark(){
 document.body.classList.toggle('dark');
}

// Função controladora de criação
function criar(){
 let tituloElement = document.getElementById('titulo');
 let tipoElement = document.getElementById('tipo');
 let localElement = document.getElementById('localizacao');

 let titulo = tituloElement.value.trim();
 let tipo = tipoElement.value;
 let local = localElement.value.trim();

 if(titulo === "" || local === "") {
   alert("Por favor, preencha todos os campos obrigatórios (Título e Localização)!");
   return;
 }

 // Estrutura de dados segura com ID único temporal estável
 let novoAnuncio = {
   id: Date.now(),
   titulo: titulo,
   tipo: tipo,
   localizacao: local,
   avaliacoes: [], 
   comentarios: [] 
 };

 listaAnuncios.push(novoAnuncio);
 
 // Reset dos campos de entrada imediatamente após salvar
 tituloElement.value = '';
 localElement.value = '';
 
 // Sincroniza a visualização do usuário com a lista atualizada
 renderizarAnuncios();
}

// Renderizador Mestre da Interface
function renderizarAnuncios(anunciosFiltrados = null) {
 let listaDiv = document.getElementById('lista');
 listaDiv.innerHTML = ''; // Limpa de forma segura eliminando lixo residual

 let dadosParaExibir = anunciosFiltrados !== null ? anunciosFiltrados : listaAnuncios;

 if(dadosParaExibir.length === 0) {
   listaDiv.innerHTML = '<p style="text-align:center; color:#64748b; font-weight:bold;">Nenhum anúncio encontrado neste momento.</p>';
   return;
 }

 dadosParaExibir.forEach(anuncio => {
   // Cálculo matemático preciso da média de avaliações
   let mediaTexto = "Sem avaliações";
   if(anuncio.avaliacoes.length > 0) {
     let soma = anuncio.avaliacoes.reduce((acumulador, valorAtual) => acumulador + valorAtual, 0);
     mediaTexto = "Nota: " + (soma / anuncio.avaliacoes.length).toFixed(1) + " ⭐";
   }

   let card = document.createElement('div');
   card.className = 'card';
   
   // Construção limpa e síncrona do escopo do elemento com os dados injetados
   card.innerHTML = `
   <h3 style="margin: 0 0 5px 0; font-size:1.4em;">${anuncio.titulo}</h3>
   <p style="margin: 5px 0; color: #64748b;">Categoria: <strong>${anuncio.tipo}</strong></p>
   <p style="margin: 5px 0;">📍 Localização: <strong>${anuncio.localizacao}</strong></p>
   
   <div class="rating-badge">
     ${mediaTexto} (${anuncio.avaliacoes.length} pareceres de usuários)
   </div>
   
   <div class="actions-container">
     <button class="actions-btn" onclick="favoritar(this)">❤️ Favoritar</button>
     <button class="actions-btn" style="background:#059669;" onclick="alert('Iniciando chat privado com o anunciante!')">💬 Conversar</button>
   </div>
   
   <div class="comment-section">
     <h4>Comentários e Análises de Clientes</h4>
     
     <div class="comment-form">
       <select id="nota-${anuncio.id}" class="star-select">
         <option value="5">⭐⭐⭐⭐⭐ (Recomendo Muito)</option>
         <option value="4">⭐⭐⭐⭐ (Vale a pena)</option>
         <option value="3">⭐⭐⭐ (Regular)</option>
         <option value="2">⭐⭐ (Deixou a desejar)</option>
         <option value="1">⭐ (Não recomendo)</option>
       </select>
       <input id="texto-comentario-${anuncio.id}" class="comment-input" placeholder="Escreva se vale a pena gastar dinheiro com isso...">
       <button class="comment-btn" onclick="adicionarComentario(${anuncio.id})">Postar</button>
     </div>

     <div class="comment-list" id="lista-comentarios-${anuncio.id}">
       ${gerarListaHTMLComentarios(anuncio.comentarios)}
     </div>
   </div>`;

   listaDiv.appendChild(card);
 });
}

// Retorna o bloco estruturado de strings contendo as avaliações reais
function gerarListaHTMLComentarios(comentarios) {
 if(comentarios.length === 0) {
   return '<p style="color:#64748b; margin:0; font-size:0.95em; italic">Nenhum comentário enviado ainda. Seja o pioneiro!</p>';
 }
 return comentarios.map(c => `
   <div class="comment-item">
     <span class="comment-stars">${"★".repeat(c.nota)}${"☆".repeat(5 - c.nota)}</span>
     <strong>(${c.nota}/5)</strong> — ${c.texto}
   </div>
 `).join('');
}

// Adiciona um comentário esperando de forma síncrona a atualização da UI
function adicionarComentario(idAnuncio) {
 let inputTexto = document.getElementById(`texto-comentario-${idAnuncio}`);
 let selectNota = document.getElementById(`nota-${idAnuncio}`);

 let texto = inputTexto.value.trim();
 let nota = parseInt(selectNota.value, 10);

 if(texto === "") {
   alert("Por favor, digite a sua opinião sobre o aluguel antes de enviar!");
   return;
 }

 // Procura estrita do registro dentro do Array referencial
 let anuncio = listaAnuncios.find(a => a.id === idAnuncio);
 if(anuncio) {
   anuncio.avaliacoes.push(nota);
   anuncio.comentarios.unshift({ nota: nota, texto: texto }); // Envia o mais recente para cima do feed
   
   // Atualiza os elementos visuais garantindo a reatividade ideal
   renderizarAnuncios();
 }
}

// Filtro integrado da Barra de Pesquisa (Filtra dinamicamente sem quebrar referências)
function filtrarAnuncios() {
 let termoBusca = document.getElementById('busca').value.toLowerCase().trim();
 
 let resultadosFiltrados = listaAnuncios.filter(anuncio => {
   return anuncio.titulo.toLowerCase().includes(termoBusca) || 
          anuncio.localizacao.toLowerCase().includes(termoBusca);
 });

 // Renderiza apenas a coleção correspondente aos critérios
 renderizarAnuncios(resultadosFiltrados);
}

function favoritar(btn){
 btn.innerText = '❤️ Favoritado';
 btn.style.background = '#db2777';
}

function publicarPedido(){
 let campoPedido = document.getElementById('pedido');
 let texto = campoPedido.value.trim();
 
 if(texto === "") {
   alert("Descreva sua necessidade antes de publicar o pedido!");
   return;
 }
 
 let div = document.createElement('div');
 div.className = 'card';
 div.innerHTML = '<strong>🚨 Pedido de Ajuda:</strong> <p style="margin:8px 0 0 0;">' + texto + '</p>';
 
 document.getElementById('pedidos').appendChild(div);
 campoPedido.value = '';
}
</script>
</body>
</html>
